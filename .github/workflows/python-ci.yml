name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for CI
        required: false
        type: string
        default: "3.12"
      coverage-threshold:
        description: Minimum test coverage percentage
        required: false
        type: number
        default: 80

permissions:
  contents: read

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Black
        run: black --check .

      - name: Type-check with MyPy
        run: mypy src

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
