name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used for CI
        required: false
        type: string
        default: "22"

permissions:
  contents: read

jobs:
  quality:
    name: Quality and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}